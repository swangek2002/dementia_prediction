is_decoder: True

data:
  batch_size: 64                    # Batch size
  unk_freq_threshold: 0.0           # Frequency required for token to be included. Tokens below threshold are transformed to <UNK>
  min_workers: 12                   # The number of workers to create for dataloader
  global_diagnoses: False           # Whether we enforce diagnoses which occurred before context block to prepend the block
  repeating_events: True            # Whether we allow repeated events. For example, if two Body Mass Index records exist then True retains both, whilst False keeps only the latest record.
  path_to_db: /Data0/swangek_data/991/CPRD/data/example_exercise_database.db
  path_to_ds: /Data0/swangek_data/991/CPRD/data/FoundationalModel/PreTrain/
  meta_information_path: /Data0/swangek_data/991/CPRD/data/FoundationalModel/PreTrain/meta_information_custom.pickle
  subsample_training: null
  num_static_covariates: 27

experiment:
  type: 'pre-train'                  # Options: ['pre-train', 'zero-shot', 'fine-tune']
  project_name: SurvivEHR
  run_id: ${head.SurvLayer}PreTrain_small_${experiment.seed}
  fine_tune_id: null
  notes: null
  tags: null
  train: True
  test: True
  verbose: True
  seed: 1337
  log: True
  log_dir: /Data0/swangek_data/991/CPRD/output/
  ckpt_dir: /Data0/swangek_data/991/CPRD/output/checkpoints/

fine_tuning:
  fine_tune_outcomes: null
  custom_outcome_method:
    _target_: null
  custom_stratification_method:
    _target_: null
  use_callbacks:
    hidden_embedding: 
      num_batches: 0
      mask_static: False
      mask_value: False
    performance_metrics: True
    rmst: False
  compression_layer: False
  llrd: null
  PEFT:
    method: null
    adapter_dim: 8
  backbone:
    linear_probe_epochs: 0
    unfreeze_top_k: null
  head:
    surv_weight: 1
    value_weight: 0
    learning_rate: 5e-4

optim: 
  num_epochs: 1
  learning_rate: 3e-4
  scheduler_warmup: True
  scheduler: decaycawarmrestarts
  scheduler_periods: 10000
  learning_rate_decay: 0.8
  val_check_interval: 1000
  early_stop: True
  early_stop_patience: 30
  log_every_n_steps: 20
  limit_val_batches: 0.025
  limit_test_batches: null
  accumulate_grad_batches: 1

transformer:
  block_type: "Neo"
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  layer_norm_bias: False
  attention_type: "global"
  bias: True
  dropout: 0.0
  attention_dropout: 0.0
  resid_dropout: 0.0
  private_heads: 0

head:
  SurvLayer: "cr"
  surv_weight: 1
  tokens_for_univariate_regression: None
  value_weight: 0.1